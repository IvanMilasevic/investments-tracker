name: Refresh Portfolio Dashboard

on:
  schedule:
    - cron: '0 17 * * 1-5'  # weekdays 17:00 UTC = 18:00 CET / 19:00 CEST (after EU market close)
  workflow_dispatch:          # manual trigger — "Run workflow" button in GitHub Actions UI

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write  # required for failure notification

# Prevent overlapping deployments
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh portfolio data
        run: python scripts/update_charts.py
        # Script exits non-zero if ledger doesn't reconcile — action fails,
        # bad data is never deployed to Pages.

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact (docs/ folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠️ Portfolio refresh failed — ${new Date().toISOString().slice(0,10)}`,
              body: [
                "The scheduled portfolio dashboard refresh failed.",
                "",
                `**Run:** [#${context.runNumber}](${runUrl})`,
                "",
                "**Common causes:**",
                "- `portfolio/transactions.csv` has a SELL that exceeds held shares (ledger doesn't reconcile)",
                "- A new ticker in `transactions.csv` is missing from `instruments.csv`",
                "- yfinance network error (retry the run manually via the Actions tab)",
                "",
                "Check the run logs above and fix `portfolio/transactions.csv` against your broker statements.",
              ].join("\n"),
              labels: ["automated"],
            });
